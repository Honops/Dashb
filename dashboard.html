<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HonoPs — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090b;--surface:#0a0a0d;--card:#111115;
  --border:rgba(201,168,76,0.1);--border2:rgba(255,255,255,0.05);
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.1);
  --white:#f0ece3;--muted:rgba(240,236,227,0.42);--muted2:rgba(240,236,227,0.18);
  --green:#3ecf8e;--green-dim:rgba(62,207,142,0.1);
  --red:#e05252;--red-dim:rgba(224,82,82,0.1);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.1);
  --orange:#f0884a;--orange-dim:rgba(240,136,74,0.1);
  --sb:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* SIDEBAR */
#sidebar{
  width:var(--sb);min-width:var(--sb);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:transform 0.3s ease;
}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);position:relative}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:var(--gold)}
.sb-badge{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:2px 8px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25)}
.sb-badge-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;animation:blink 1.5s infinite}
.sb-badge-t{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.sb-close{display:none;position:absolute;top:14px;right:14px;background:none;border:1px solid rgba(201,168,76,0.2);color:var(--gold);width:24px;height:24px;cursor:pointer;font-size:10px;align-items:center;justify-content:center;transition:all 0.2s}
.sb-sec{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(201,168,76,0.4);text-transform:uppercase;padding:14px 20px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:3px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border:1px solid transparent;transition:all 0.15s;user-select:none}
.ni:hover{background:rgba(255,255,255,0.04);color:var(--white)}
.ni.on{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.2);color:var(--gold)}
.ni-ic{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:white;font-size:8px;font-weight:700;padding:2px 5px;border-radius:8px;font-family:'DM Mono',monospace}
.sb-bot{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:3px}
.uav{width:28px;height:28px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;
}
#hamburger{display:none;background:none;border:1px solid rgba(201,168,76,0.2);color:var(--gold);width:32px;height:32px;cursor:pointer;font-size:15px;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
#page-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gold)}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);padding:3px 8px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gold)}
#topbar-date{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
#content{flex:1;overflow-y:auto;padding:22px 24px}

/* OVERLAY */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:149;backdrop-filter:blur(4px)}

/* COMPONENTS */
.panel{background:var(--card);border:1px solid var(--border2);padding:20px;animation:fadeUp 0.4s ease both}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pt{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.pa{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--gold);cursor:pointer;text-transform:uppercase;border:none;background:none}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border2);padding:18px;position:relative;overflow:hidden;animation:fadeUp 0.4s ease both}
.kl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.kv{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1;margin-bottom:6px}
.ks{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px}
.kglow{position:absolute;bottom:-10px;right:-10px;width:50px;height:50px;border-radius:50%;filter:blur(18px);opacity:0.25}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.alert{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;animation:fadeUp 0.3s ease both}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.row:last-child{border-bottom:none}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ri{flex:1;min-width:0}
.rn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rm{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 7px;text-transform:uppercase;flex-shrink:0}
.bv{background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);color:var(--gold)}
.bc{background:var(--green-dim);border:1px solid rgba(62,207,142,0.2);color:var(--green)}
.bp{background:var(--orange-dim);border:1px solid rgba(240,136,74,0.2);color:var(--orange)}
.br{background:var(--red-dim);border:1px solid rgba(224,82,82,0.2);color:var(--red)}
.bb{background:var(--blue-dim);border:1px solid rgba(91,156,246,0.2);color:var(--blue)}
.chart{display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:6px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:1px;min-height:3px}
.blbl{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted2);letter-spacing:1px}
.bval{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted)}
.progress{height:3px;background:rgba(255,255,255,0.06)}
.pfill{height:100%;transition:width 0.5s}
.tbl-hd{display:grid;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02)}
.tbl-row{display:grid;padding:12px 16px;border-bottom:1px solid var(--border2);align-items:center;transition:background 0.15s;cursor:pointer}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:rgba(255,255,255,0.02)}
.th{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(240,236,227,0.25);text-transform:uppercase}
.btn-sm{padding:5px 10px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.2s}
.status-card{padding:14px;display:flex;align-items:center;gap:12px}

/* MOBILE */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;bottom:0;left:0;z-index:150;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #hamburger{display:flex!important}
  .sb-close{display:flex!important}
  .kpi-grid,.g4,.g3{grid-template-columns:1fr 1fr}
  .g2,.g31{grid-template-columns:1fr}
  #topbar-date{display:none}
  #content{padding:16px}
}
</style>
</head>
<body>

<div id="sb-overlay" onclick="closeSb()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-brand">HONOPS</div>
    <div class="sb-badge"><div class="sb-badge-dot"></div><span class="sb-badge-t">Super Admin</span></div>
    <button class="sb-close" onclick="closeSb()">✕</button>
  </div>
  <div class="sb-sec">Navigation</div>
  <div class="ni on" onclick="go('overview',this)"><span class="ni-ic">▦</span>Vue globale</div>
  <div class="ni" onclick="go('clubs',this)"><span class="ni-ic">◈</span>Tous les clubs</div>
  <div class="ni" onclick="go('finances',this)"><span class="ni-ic">💰</span>Finances</div>
  <div class="ni" onclick="go('tickets',this)"><span class="ni-ic">🎟</span>Billets globaux</div>
  <div class="ni" onclick="go('stats',this)"><span class="ni-ic">⬟</span>Statistiques</div>
  <div class="ni" onclick="go('notifs',this)"><span class="ni-ic">🔔</span>Notifications<span class="ni-badge">2</span></div>
  <div class="ni" onclick="go('support',this)"><span class="ni-ic">⚡</span>Support</div>
  <div class="ni" onclick="go('logs',this)"><span class="ni-ic">◎</span>Logs activité</div>
  <div class="sb-bot">
    <div class="user-pill">
      <div class="uav">👑</div>
      <div><div style="font-size:11px;font-weight:600">Fondateur</div><div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:1px">HonoPs</div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button id="hamburger" onclick="openSb()">☰</button>
    <div id="page-title">VUE GLOBALE</div>
    <div class="live-pill"><div class="sb-badge-dot"></div>ADMIN</div>
    <div id="topbar-date"></div>
  </div>
  <div id="content"></div>
</div>

<script>
// ── DATA ──
const CLUBS=[
  {id:1,nom:'Gallery Club',ville:'Málaga',slug:'gallery-club',color:'#c9a84c',statut:'active',billets:247,rev:4410,trial:null,pastDue:null,inscrit:'Jan 2026'},
  {id:2,nom:'Sala Gold',ville:'Málaga',slug:'sala-gold',color:'#5b9cf6',statut:'trial',billets:0,rev:0,trial:67,pastDue:null,inscrit:'Fév 2026'},
  {id:3,nom:'Discoteca Andén',ville:'Málaga',slug:'discoteca-anden',color:'#3ecf8e',statut:'past_due',billets:142,rev:2840,trial:null,pastDue:9,inscrit:'Nov 2025'},
  {id:4,nom:'Fabrik',ville:'Madrid',slug:'fabrik',color:'#e05252',statut:'active',billets:580,rev:11600,trial:null,pastDue:null,inscrit:'Oct 2025'},
  {id:5,nom:'Pacha',ville:'Ibiza',slug:'pacha',color:'#f0884a',statut:'active',billets:890,rev:22250,trial:null,pastDue:null,inscrit:'Sep 2025'},
  {id:6,nom:'Joy Eslava',ville:'Madrid',slug:'joy-eslava',color:'#9b59b6',statut:'trial',billets:0,rev:0,trial:45,pastDue:null,inscrit:'Mar 2026'},
]
const TICKETS=[
  {nom:'Carlos M.',email:'carlos@gmail.com',event:'TECHNO NIGHT',club:'Gallery Club',type:'normal',prix:18,date:'22 Mar',used:true},
  {nom:'Sofia R.',email:'sofia@gmail.com',event:'TECHNO NIGHT',club:'Gallery Club',type:'vip',prix:120,date:'22 Mar',used:false},
  {nom:'Marcus T.',email:'marcus@gmail.com',event:'HOUSE SESSIONS',club:'Gallery Club',type:'early',prix:14,date:'21 Mar',used:false},
  {nom:'Laura K.',email:'laura@gmail.com',event:'FABRIK NIGHT',club:'Fabrik',type:'vip',prix:80,date:'19 Mar',used:true},
  {nom:'Pedro S.',email:'pedro@gmail.com',event:'PACHA OPENING',club:'Pacha',type:'normal',prix:25,date:'18 Mar',used:true},
  {nom:'Ana M.',email:'ana@gmail.com',event:'MINIMAL RAVE',club:'Gallery Club',type:'normal',prix:22,date:'20 Mar',used:false},
]
const LOGS=[
  {action:'billet_vendu',club:'Gallery Club',detail:'Sofia R. · VIP · 120€',time:'23:47',color:'var(--gold)',icon:'🎟'},
  {action:'club_inscrit',club:'Joy Eslava',detail:'Madrid · Trial démarré',time:'22:15',color:'var(--green)',icon:'✓'},
  {action:'qr_scanne',club:'Gallery Club',detail:'Carlos M. · VALIDE',time:'23:51',color:'var(--orange)',icon:'⬡'},
  {action:'paiement_echoue',club:'Discoteca Andén',detail:'Carte refusée · Jour 9',time:'18:30',color:'var(--red)',icon:'✕'},
  {action:'newsletter_envoyee',club:'Fabrik',detail:'1.247 emails · 71% ouverture',time:'12:00',color:'var(--blue)',icon:'✉'},
  {action:'billet_vendu',club:'Pacha',detail:'Pedro S. · Normal · 25€',time:'11:22',color:'var(--gold)',icon:'🎟'},
  {action:'club_reactive',club:'Joy Eslava',detail:'Abonnement réactivé',time:'10:05',color:'var(--green)',icon:'▶'},
]

const actifs=CLUBS.filter(c=>c.statut==='active').length
const trials=CLUBS.filter(c=>c.statut==='trial').length
const pastDue=CLUBS.filter(c=>c.statut==='past_due').length
const mrr=actifs*200
const totalRev=CLUBS.reduce((s,c)=>s+c.rev,0)
const totalBillets=CLUBS.reduce((s,c)=>s+c.billets,0)

// ── PAGES ──
const PAGES={
  overview:()=>`
    ${pastDue>0?`<div class="alert" style="background:var(--red-dim);border:1px solid rgba(224,82,82,0.25)">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:5px;height:5px;background:var(--red);border-radius:50%;animation:blink 1s infinite"></div>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--red);letter-spacing:1px">${pastDue} CLUB EN RETARD DE PAIEMENT — DISCOTECA ANDÉN — 9 JOURS</span>
      </div>
      <button class="btn-sm" style="background:var(--red-dim);border:1px solid rgba(224,82,82,0.3);color:var(--red)" onclick="go('finances',null)">Voir →</button>
    </div>`:''}
    <div class="kpi-grid">
      ${[['Clubs actifs',actifs,'var(--green)','↑ +1 cette semaine'],['MRR récurrent',mrr+'€','var(--gold)','En croissance'],['Total billets',totalBillets.toLocaleString(),'var(--blue)','↑ +247 ce mois'],['Volume total',Math.round(totalRev/1000)+'K€','var(--orange)','Billets via HonoPs']].map(([l,v,c,s],i)=>`
      <div class="kpi" style="animation-delay:${i*.05}s">
        <div class="kl">${l}</div><div class="kv" style="color:${c}">${v}</div>
        <div class="ks" style="color:var(--green)">${s}</div>
        <div class="kglow" style="background:${c}"></div>
      </div>`).join('')}
    </div>
    <div class="g4">
      ${[['Trial',trials,'var(--blue)','◎'],['Actifs',actifs,'var(--green)','✓'],['En retard',pastDue,'var(--red)','⚠'],['Annulés',0,'var(--muted)','✕']].map(([l,v,c,ic])=>`
      <div style="background:var(--card);border:1px solid ${l==='En retard'&&v>0?'rgba(224,82,82,0.25)':'var(--border2)'};padding:14px;display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;background:${c}15;border:1px solid ${c}30;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:${c};flex-shrink:0">${ic}</div>
        <div><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${c};letter-spacing:2px;line-height:1">${v}</div><div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px">${l}</div></div>
      </div>`).join('')}
    </div>
    <div class="g31">
      <div class="panel" style="animation-delay:.3s">
        <div class="ph"><div class="pt">Volume billets — 6 derniers mois</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px">${Math.round(totalRev/1000)}K€ TOTAL</div></div>
        <div class="chart" id="adminChart"></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px">${['OCT','NOV','DÉC','JAN','FÉV','MAR'].map(m=>`<span style="flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:7px;color:var(--muted2)">${m}</span>`).join('')}</div>
      </div>
      <div class="panel" style="animation-delay:.35s">
        <div class="pt" style="margin-bottom:14px">Projection MRR</div>
        ${[[actifs,"Aujourd'hui",'var(--gold)'],[10,'À 10 clubs','var(--green)'],[25,'À 25 clubs','var(--blue)'],[50,'À 50 clubs','var(--orange)']].map(([n,l,c])=>`
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border2)">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">${l}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${c};letter-spacing:1px">${(n*200).toLocaleString()}€/mois</span>
          </div>
          <div class="progress"><div class="pfill" style="width:${Math.min(n/50*100,100)}%;background:${c}"></div></div>
        </div>`).join('')}
      </div>
    </div>`,

  clubs:()=>`
    <div style="background:var(--card);border:1px solid var(--border2)">
      <div class="tbl-hd" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr 100px">
        ${['Club','Ville','Statut','Info','Inscrit','Actions'].map(h=>`<div class="th">${h}</div>`).join('')}
      </div>
      ${CLUBS.map(c=>{
        const sc={active:{bg:'var(--green-dim)',b:'rgba(62,207,142,0.2)',col:'var(--green)',l:'ACTIF'},trial:{bg:'var(--blue-dim)',b:'rgba(91,156,246,0.2)',col:'var(--blue)',l:'TRIAL'},past_due:{bg:'var(--red-dim)',b:'rgba(224,82,82,0.2)',col:'var(--red)',l:'EN RETARD'},cancelled:{bg:'rgba(255,255,255,0.03)',b:'var(--border2)',col:'var(--muted)',l:'ANNULÉ'}}[c.statut]||{}
        return `<div class="tbl-row" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr 100px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:30px;height:30px;background:${c.color}20;border:1px solid ${c.color}40;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">🎵</div>
            <div><div style="font-size:12px;font-weight:600">${c.nom}</div><div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:1px">honops.es/${c.slug}</div></div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${c.ville}</div>
          <div><span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 7px;background:${sc.bg};border:1px solid ${sc.b};color:${sc.col};text-transform:uppercase">${sc.l}</span></div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:${c.statut==='past_due'?'var(--red)':c.statut==='trial'?'var(--blue)':'var(--green)'}">
            ${c.statut==='trial'?c.trial+'j restants':c.statut==='past_due'?'⚠ '+c.pastDue+'j retard':c.statut==='active'?'✓ OK':'—'}
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2)">${c.inscrit}</div>
          <div style="display:flex;gap:4px">
            <button class="btn-sm" style="background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--muted)" title="Voir site" onclick="alert('Ouverture de honops.es/${c.slug}...')">↗</button>
            <button class="btn-sm" style="background:${c.statut==='cancelled'?'var(--green-dim)':'var(--red-dim)'};border:1px solid ${c.statut==='cancelled'?'rgba(62,207,142,0.2)':'rgba(224,82,82,0.2)'};color:${c.statut==='cancelled'?'var(--green)':'var(--red)'}" onclick="alert('${c.statut==='cancelled'?'Club réactivé':'Club suspendu'}!')">
              ${c.statut==='cancelled'?'✓':'✕'}
            </button>
          </div>
        </div>`}).join('')}
    </div>`,

  finances:()=>`

// ── NAVIGATION ──
const TITLES={overview:'VUE GLOBALE',clubs:'TOUS LES CLUBS',finances:'FINANCES',tickets:'BILLETS GLOBAUX',stats:'STATISTIQUES',notifs:'NOTIFICATIONS',support:'SUPPORT',logs:"LOGS D'ACTIVITÉ"}

function go(page, navEl){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'))
  if(navEl) navEl.classList.add('on')
  else document.querySelector('.ni[onclick*="'+page+'"]')?.classList.add('on')
  document.getElementById('page-title').textContent=TITLES[page]||page.toUpperCase()
  document.getElementById('content').innerHTML=PAGES[page]?PAGES[page]():'<div class="panel"><div class="pt">En développement</div></div>'
  if(page==='overview') setTimeout(()=>{
    const el=document.getElementById('adminChart')
    if(!el) return
    const data=[3200,4800,5100,6400,9200,12400]
    const max=Math.max(...data)
    el.innerHTML=data.map((v,i)=>`<div class="bw"><div class="bval">${(v/1000).toFixed(1)}K</div><div class="bar ${i===5?'today':''}" style="height:${Math.round(v/max*100)}%;background:${i===5?'var(--gold)':'rgba(201,168,76,0.25)'};border:1px solid ${i===5?'var(--gold)':'rgba(201,168,76,0.35)'}"></div></div>`).join('')
  },50)
  closeSb()
}

// ── SIDEBAR MOBILE ──
function openSb(){
  document.getElementById('sidebar').classList.add('open')
  document.getElementById('sb-overlay').style.display='block'
}
function closeSb(){
  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('sb-overlay').style.display='none'
}

// ── INIT ──
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()
go('overview', document.querySelector('.ni.on'))
